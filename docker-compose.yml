version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: taskflow_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskflow_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow_backend
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@db:3306/taskflow_db
      - SECRET_KEY=taskflow-dev-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - UPLOAD_DIR=/app/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend/chroma_data:/app/chroma_data
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow_frontend
    environment:
      - VITE_API_URL=http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
